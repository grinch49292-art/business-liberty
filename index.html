<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liberty</title>

  <!-- favicon -->
  <link rel="icon" type="image/svg+xml" href="./pages/symbol_dark.svg" />
  <link rel="apple-touch-icon" href="./pages/symbol_dark.svg" />

  <style>
    :root {
      --blue-violet: #6c7bff;
      --bright-violet: #db63db;
      --deep-purple: #13071e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--deep-purple);
    }

    body {
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(1200px 760px at 34% -8%, rgba(142, 164, 255, 0.60), transparent 62%),
        radial-gradient(760px 520px at 102% 0%, rgba(219, 99, 219, 0.40), transparent 70%),
        linear-gradient(180deg, #2f3796 0%, #211050 38%, #140726 70%, #0d0419 100%);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    /* Сетка (крупная + мелкая), как на референсе */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.075) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.075) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px);
      background-size:
        46px 46px,
        46px 46px,
        11px 11px,
        11px 11px;
      opacity: 0.58;
      mix-blend-mode: screen;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Главное мягкое верхнее свечение */
    .top-glow {
      position: absolute;
      top: -130px;
      left: 50%;
      transform: translateX(-50%);
      width: min(78vw, 1060px);
      height: min(62vw, 710px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 52%, rgba(255,255,255,0.34), rgba(176,187,255,0.18) 38%, rgba(136,115,239,0.11) 58%, transparent 72%);
      filter: blur(13px);
      z-index: 0;
      pointer-events: none;
    }

    /* Фоновый призрак */
    .ghost-bg {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(90vw, 1020px);
      transform: translate(-50%, -52%);
      opacity: 0.12;
      filter: saturate(1.06) contrast(1.03);
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      z-index: 2;
    }

    /* Нижние фиолетовые оттенки как в референсе */
    .bottom-violet {
      position: absolute;
      inset: auto 0 0 0;
      height: 30%;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(120% 130% at 50% 120%, rgba(192, 22, 196, 0.33) 0%, rgba(145, 24, 176, 0.16) 35%, rgba(84, 18, 132, 0.08) 58%, transparent 80%),
        linear-gradient(180deg, transparent 0%, rgba(105, 22, 134, 0.22) 65%, rgba(99, 18, 128, 0.34) 100%);
      filter: blur(0.2px);
    }

    /* Глубина по краям */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(95% 70% at 50% -12%, transparent 38%, rgba(9,2,19,0.34) 73%, rgba(7,2,14,0.64) 100%),
        linear-gradient(180deg, transparent 58%, rgba(9, 2, 17, 0.46) 100%);
    }

    /* Пустое место под будущий контент */
    .content-placeholder {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    @media (max-width: 900px) {
      .ghost-bg {
        width: 125vw;
        opacity: 0.14;
      }

      .bottom-violet {
        height: 34%;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="top-glow"></div>

    <img
      class="ghost-bg"
      src="./pages/symbol_gradient.png"
      alt=""
      aria-hidden="true"
    />

    <div class="bottom-violet"></div>
    <div class="vignette"></div>

    <div class="content-placeholder"></div>
  </div>
</body>
</html>
