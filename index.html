<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liberty</title>

  <!-- favicon -->
  <link rel="icon" type="image/svg+xml" href="./pages/symbol_dark.svg" />
  <link rel="apple-touch-icon" href="./pages/symbol_dark.svg" />

  <style>
    :root {
      --blue-violet: #6c7bff;
      --bright-violet: #db63db;
      --cotton-cloud: #fef3ff;
      --deep-purple: #13071e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--deep-purple);
    }

    body {
      position: relative;
      isolation: isolate;
      /* Основной фон */
      background:
        radial-gradient(1200px 720px at 30% -10%, rgba(124, 148, 255, 0.62), transparent 60%),
        radial-gradient(760px 520px at 102% 0%, rgba(219, 99, 219, 0.46), transparent 70%),
        linear-gradient(180deg, #2d2f86 0%, #1e0f44 42%, #13071e 100%);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    /* Сетка как в референсе */
    body::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;

  /* крупная сетка */
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.085) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.085) 1px, transparent 1px),

    /* мелкая под-сетка для глубины */
    linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);

  background-size:
    48px 48px,
    48px 48px,
    12px 12px,
    12px 12px;

  background-position:
    0 0,
    0 0,
    0 0,
    0 0;

  opacity: 0.6;
  mix-blend-mode: screen;
}

    /* Легкая виньетка для глубины */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(100% 65% at 50% -10%, transparent 42%, rgba(8, 2, 16, 0.35) 75%, rgba(5, 1, 11, 0.7) 100%),
        linear-gradient(180deg, rgba(0,0,0,0) 58%, rgba(12, 3, 24, 0.75) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .scene {
  position: relative;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% -10%, rgba(255,255,255,0.06), transparent 45%);
}

    /* Большой призрак на фоне */
    .ghost-bg {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(86vw, 980px);
      transform: translate(-50%, -52%);
      opacity: 0.13;
      filter: blur(0.2px) saturate(1.05);
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      z-index: 1;
    }

    /* Мягкое световое пятно сверху */
    .top-glow {
      position: absolute;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: min(74vw, 980px);
      height: min(55vw, 620px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 48%, rgba(236, 240, 255, 0.33), rgba(173, 176, 255, 0.16) 36%, rgba(137, 110, 237, 0.08) 57%, transparent 72%);
      filter: blur(14px);
      pointer-events: none;
      z-index: 0;
    }

    /* Тёмные "глаза" внизу как на рефе */
    .eye {
      position: absolute;
      width: 23vw;
      max-width: 360px;
      aspect-ratio: 1.35 / 1;
      background: radial-gradient(ellipse at 45% 45%, rgba(8, 3, 18, 0.7), rgba(5, 1, 12, 0.9));
      filter: blur(1px);
      opacity: 0.42;
      border-radius: 48% 52% 40% 60% / 60% 55% 45% 40%;
      z-index: 1;
      pointer-events: none;
    }

    .eye.left {
      left: 8%;
      top: 42%;
      transform: rotate(-10deg);
    }

    .eye.right {
      right: 8%;
      top: 42%;
      transform: scaleX(-1) rotate(-10deg);
    }

    /* Пустой контейнер под будущий контент */
    .content-placeholder {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    @media (max-width: 900px) {
      .ghost-bg {
        width: 120vw;
        opacity: 0.16;
      }

      .eye {
        width: 34vw;
        top: 47%;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="top-glow"></div>

    <img
      class="ghost-bg"
      src="./pages/symbol_gradient.png"
      alt=""
      aria-hidden="true"
    />

    <div class="eye left"></div>
    <div class="eye right"></div>

    <div class="content-placeholder"></div>
  </div>
</body>
</html>
